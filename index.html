<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quixote Vassilakis</title>
  <meta name="description" content="Quixote Vassilakis is a skills transformation and organizational development professional working across learning, talent, and data-informed program management." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-hero: clamp(3rem, 1rem + 6vw, 5.5rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;

      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;

      --color-bg: #f5f9fa;
      --color-surface: #fbfdfe;
      --color-surface-2: #f7fbfc;
      --color-surface-offset: #edf3f5;
      --color-border: #cbd7dc;
      --color-text: #1b2730;
      --color-text-muted: #53656f;
      --color-text-faint: #7e9099;
      --color-primary: #234a66;
      --color-primary-hover: #18384f;
      --color-accent: #4d8b7a;
      --color-text-inverse: #f5f9fa;

      --shadow-sm: 0 1px 2px rgba(17, 33, 43, 0.08);
      --shadow-md: 0 12px 30px rgba(17, 33, 43, 0.1);

      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Manrope', system-ui, sans-serif;
      --content-width: 1120px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --color-bg: #101a21;
      --color-surface: #15242d;
      --color-surface-2: #1a2c36;
      --color-surface-offset: #213844;
      --color-border: #314956;
      --color-text: #dce8ec;
      --color-text-muted: #abc0c8;
      --color-text-faint: #7f98a1;
      --color-primary: #7aa8c7;
      --color-primary-hover: #9ac0d8;
      --color-accent: #78b19d;
      --color-text-inverse: #101a21;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-padding-top: 5rem;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.65;
      background: var(--color-bg);
      color: var(--color-text);
    }
    img, svg { display: block; max-width: 100%; height: auto; }
    a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: none;
      transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    p { max-width: 68ch; margin: 0; }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: var(--space-4);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      padding: 0.85rem 1rem;
      border-radius: var(--radius-md);
      z-index: 1000;
    }
    .skip-link:focus { left: var(--space-4); }

    .container {
      width: min(var(--content-width), calc(100% - 2rem));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--color-bg) 88%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      min-height: 4.75rem;
      padding: var(--space-2) 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 2.125rem;
      height: 2.125rem;
      color: var(--color-primary);
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .nav-links a:hover { color: var(--color-text); }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      min-width: 2.75rem;
      border: 1px solid color-mix(in srgb, var(--color-text) 12%, transparent);
      border-radius: var(--radius-full);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
    }

    main section {
      padding: clamp(4rem, 8vw, 7rem) 0;
    }

    .hero {
      padding-top: clamp(5rem, 10vw, 8rem);
    }

    .hero-grid,
    .about-grid,
    .contact-grid {
      display: grid;
      gap: var(--space-12);
      align-items: start;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: var(--space-4);
      color: var(--color-accent);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1, h2 {
      font-family: var(--font-display);
      font-weight: 400;
      line-height: 1.03;
      letter-spacing: -0.03em;
      margin: 0;
    }

    h1 {
      max-width: 10ch;
      font-size: var(--text-hero);
      margin-bottom: var(--space-6);
    }

    h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: var(--space-4);
    }

    h3 {
      margin: 0 0 var(--space-3);
      font-size: var(--text-lg);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .hero-copy {
      max-width: 60ch;
      color: var(--color-text-muted);
      font-size: var(--text-lg);
    }

    .hero-actions,
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.875rem;
      margin-top: var(--space-8);
    }

    .btn,
    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.85rem 1.2rem;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
    }
    .btn-primary:hover,
    .btn-primary:focus-visible { background: var(--color-primary-hover); }

    .btn-secondary,
    .contact-link {
      border-color: color-mix(in srgb, var(--color-text) 12%, transparent);
      background: var(--color-surface);
      color: var(--color-text);
      box-shadow: var(--shadow-sm);
    }

    .hero-note {
      margin-top: var(--space-10);
      padding-top: var(--space-6);
      border-top: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      color: var(--color-text-muted);
      max-width: 62ch;
    }

    .portrait-wrap,
    .summary-card,
    .contact-box {
      padding: var(--space-4);
      background: linear-gradient(180deg, var(--color-surface), var(--color-surface-2));
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }

    .portrait {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: calc(var(--radius-xl) - var(--space-4));
      background: var(--color-surface-offset);
    }

    .summary-card {
      padding: var(--space-8);
    }

    .summary-list {
      display: grid;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }

    .summary-list div {
      padding-top: var(--space-4);
      border-top: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
    }

    .meta {
      display: block;
      margin-bottom: 0.25rem;
      font-size: var(--text-sm);
      letter-spacing: 0.02em;
      color: var(--color-text-faint);
    }

    .section-intro {
      display: grid;
      gap: var(--space-3);
      margin-bottom: var(--space-10);
      max-width: 56ch;
    }

    .section-intro p,
    .card p,
    .contact-copy,
    .summary-card p {
      color: var(--color-text-muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: var(--space-4);
    }

    .card {
      grid-column: span 12;
      padding: var(--space-8);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }

    .contact-box {
      padding: var(--space-8);
    }

    .site-footer {
      padding: var(--space-8) 0 var(--space-12);
      color: var(--color-text-faint);
      font-size: var(--text-sm);
    }

    @media (min-width: 760px) {
      .hero-grid,
      .contact-grid { grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr); }
      .about-grid { grid-template-columns: minmax(0, 1fr) minmax(0, 0.95fr); }
      .card-grid .card:nth-child(1),
      .card-grid .card:nth-child(2),
      .card-grid .card:nth-child(3),
      .card-grid .card:nth-child(4) { grid-column: span 6; }
    }

    @media (max-width: 759px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 1rem 0;
      }
      .nav-links {
        width: 100%;
        flex-wrap: wrap;
        justify-content: space-between;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="#top" aria-label="Quixote Vassilakis home">
        <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="2.5"/>
          <path d="M16 27c2.5-6.667 7-10 13.5-10 1.833 0 3.667.333 5.5 1" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M19 31c2.667 2.667 5.667 4 9 4 4.333 0 7.667-2 10-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>Quixote Vassilakis</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode"></button>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero" id="top">
      <div class="container hero-grid">
        <div>
          <span class="eyebrow">Skills transformation · learning · organizational development</span>

    <section id="about">
      <div class="container about-grid">
        <div class="section-intro">
          <div class="contact-links">
            <a class="contact-link" href="mailto:qvassilakis@gmail.com">email</a>
            <a class="contact-link" href="https://www.linkedin.com/in/quixotevassilakis" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a class="contact-link" href="https://github.com/QVassilakis" target="_blank" rel="noopener noreferrer">GitHub</a>
          </div>
        </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">Quixote Vassilakis · New York</div>
  </footer>

  <script>
    (function () {
      const toggle = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

      function renderIcon(current) {
        toggle.innerHTML = current === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
        toggle.setAttribute('aria-label', current === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      }

      root.setAttribute('data-theme', theme);
      renderIcon(theme);

      toggle.addEventListener('click', function () {
        theme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', theme);
        renderIcon(theme);
      });
    })();
  </script>
</body>
</html>
